    <script>
      // Lightweight AudioWorklet polyfill: ensure `audioContext.audioWorklet.addModule`
      // exists so p5.sound won't throw when audioWorklet is unavailable.
      (function(){
        try {
          if (typeof AudioContext === 'undefined' && typeof webkitAudioContext !== 'undefined') {
            window.AudioContext = webkitAudioContext;
          }
          if (typeof AudioContext !== 'undefined') {
            // Do not force creating AudioContext (may require user gesture),
            // but ensure global reference if one exists.
            const ctx = window.audioContext || window._p5_audio_ctx || null;
            if (ctx && !ctx.audioWorklet) {
              ctx.audioWorklet = { addModule: function() { return Promise.resolve(); } };
            }
            // Provide a safe stub if someone tries to access audioWorklet before ctx exists
            if (!AudioContext.prototype.audioWorklet) {
              AudioContext.prototype.audioWorklet = { addModule: function() { return Promise.resolve(); } };
            }
          }
        } catch (e) {
          console.warn('AudioWorklet polyfill failed', e);
        }
      })();
    </script>
